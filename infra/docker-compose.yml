services:
  # ── Backend Node.js / TypeScript ──────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: motoweather-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - ../.env
    networks:
      - motoweather-net
    depends_on:
      osrm:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── OSRM Routing Engine ───────────────────────────────────────────
  osrm:
    image: osrm/osrm-backend:latest
    container_name: motoweather-osrm
    restart: unless-stopped
    command: osrm-routed --algorithm mld /data/ile-de-france-latest.osrm
    volumes:
      - ./osrm/data:/data:ro
    networks:
      - motoweather-net
    # Not exposed to host — only accessible via motoweather-net

networks:
  motoweather-net:
    name: motoweather-net
    driver: bridge
