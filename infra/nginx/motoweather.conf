# Rate limiting zone for expensive route analysis endpoint
limit_req_zone $binary_remote_addr zone=route_limit:10m rate=1r/s;

server {
    listen 80;
    server_name meteo.reforgelab.dev;

    # Redirect HTTP → HTTPS (Certbot will manage this after SSL setup)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name meteo.reforgelab.dev;

    # ── SSL — Certbot will replace these paths ──
    # Run: sudo certbot --nginx -d meteo.reforgelab.dev
    ssl_certificate /etc/letsencrypt/live/meteo.reforgelab.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meteo.reforgelab.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Gzip ──
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 256;

    # ── Proxy to backend ──
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers for mobile app
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Rate limiting on expensive route ──
    location /api/route/analyze {
        limit_req zone=route_limit burst=5 nodelay;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
